<!DOCTYPE html>
<html lang="en">
<head>

</head> 
<body>
  <h1>display Playground</h1>
  <!-- inline/block/inline-block/none -->
  <div id="box1">this is first box</div>
  <div id="box2">this is second box</div>
  <div id="box3">this is third box</div>
</body>
</html>

<!-- 
1) block elements :  
They take full width of the parent
Always start on a new line
We can set width, height, padding and margin (on all sides)

2) Inline elements : 
Takes only required width
Stays in the same line
Cannot properly set width and height
Only left and right margin/padding is possible, top and bottom doesn't behave properly

3) Inline-block : 
stays in same line
we can set everything 

-->
