<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Spotify - Web Player: Music for everyone </title>
	<link rel="icon" href="assets/Logo and icons/favicon.ico">
	<link rel="stylesheet" href="style.css">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

</head>
<body>
	<!-------------- HEADER ------------>
	<header>
		<div class="header-left">
			<div class="header-left-icons">
				<img src="assets/Logo and icons/logo.png" alt="logo">
				<img src="assets/Logo and icons/home.png" alt="home">
			</div>
			<div class="header-left-search-icon">
				<i class="fa-solid fa-magnifying-glass" style="color: rgb(154, 152, 152);"></i>
			</div>
			<input type="text" placeholder="What do you want to play?">
			<div class="header-left-browse">
				<p>|</p>
				<img src="assets/Logo and icons/browse.png" alt="browse">
			</div>
		</div>

		<div class="header-right">
			<a href="#" class="header-glow">Premium</a>
			<a href="#" class="header-glow">Support</a>
			<a href="#" class="header-glow">Download</a>
			<span class="bar">|</span>
			<span class="install header-glow">
				<img src="assets/Logo and icons/install.png" alt="install"> Install App
			</span>
			<span class="header-glow">Sign up</span>
			<button class="button-glow">Log in</button>
			
		</div>
	</header>


	<!-- MAIN -->
	<div class="side-nav">
		
	</div>


</body>
</html>
