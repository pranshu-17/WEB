<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Spotify - Web Player: Music for everyone </title>
	<link rel="icon" href="assets/Logo and icons/favicon.ico">
	<link rel="stylesheet" href="style.css">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

</head>
<body>
	<!-------------- HEADER ------------>
	<header>
		<div class="header-left"> 
			<div class="header-logo-home">
				<img src="assets/Logo and icons/logo.png" alt="logo">
				<span class="header-logo-tooltip">
					Home
				</span>
			</div>
			<div class="header-search-bar">
				<i class="fa-solid fa-magnifying-glass" style="color: rgb(126, 124, 124);"></i>
				
				<input type="text" placeholder="What do you want to play?" class="header-search-bar-input">
				<div class="header-search-bar-input-tooltip">Ctrl + Shift + L</div>
				
				<div class="header-search-bar-browse">
					<p>|</p>
					<img src="assets/Logo and icons/browse.png" alt="browse">
				</div>
			</div>
			
		</div>

		<div class="header-right">
			<li><a href="#" class="header-icon-glow">Premium</a></li>
			<li><a href="#" class="header-icon-glow">Support</a></li>
			<li><a href="#" class="header-icon-glow">Download</a></li>
			<li><p>|</p></li>
			<li><i class="fa-solid fa-download" style="color: rgb(108, 104, 104);"></i><a href="" class="header-icon-glow">Install App</a></li>
			
			<div class="header-right-account">
				<div class="header-account-sign-up"><li><a href="#" class="header-icon-glow">Sign up</a></li></div>
				<button class="header-account-login">Log in</button>
			</div>
		</div>
	</header>


</body>
</html>
