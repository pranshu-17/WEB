        display: grid;
        grid-template-columns: 100px 1fr 2fr;
        margin-top: 30px;
        ">

<!-- 
1) Grids are inline-block by default

2) no extra space in between two columns

3) fr: fraction / free space

4) grid-column: 2/4 (from 2nd to 4th column)
   
5) justify-items and align-items are used within the cell
                    while 
justify-content and align-content are used to align the whole grid in the container

-->
