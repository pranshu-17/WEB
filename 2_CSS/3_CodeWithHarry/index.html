<!DOCTYPE html>
<html lang="en">
  <head> 
    <meta charset="UTF-8">  
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Building Netflix Clone">
    <title>Netflix India - Watch Shows Online, Watch Movies Online</title>

    <!-- favicon -->
    <link rel="icon" href="assets/icons and logos/favicon.ico">

    <!-- shorthand => link: css -->
    <link rel="stylesheet" href="style.css">

    <!-- Importing font-styles from google fonts -->
     <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@200..700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">

    <!-- Importing font awesome for icons  -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  </head>

  <body>
    <!------------------------ HEADER ----------------------------->
    <header>   
      <nav class="navbar">
        <div class="nav-logo"> 
          <img src="assets/icons and logos/logo.svg" class="logo" alt="Netflix Logo">    
        </div>
      
        <div class="nav-buttons">
          <div class="nav-lang">
            <i class="fa-solid fa-language nav-lang-icon"></i>
            <select class="nav-select">
              <option>English</option>
              <option>Hindi</option>
            </select>
          </div>
          
          <button class="nav-signin">
            Sign In
          </button>
        </div>
      </nav>
    </header>



    
    <!--------------------- HERO ---------------------------> 
    <main>
      <section class="hero">

        <div class="content">
          <div class="hero-title">
            Unlimited movies, shows, and more
          </div>
          
          <div class="hero-description1">
            Starts at ₹149. Cancel at any time.
          </div>
          
          <div class="hero-description2">
            Ready to watch? Enter your email to create or restart your membership
          </div>
          
          <div class="hero-login">
            <input type="email" placeholder="Email address">
            
            <button>Get Started &gt;</button>
          </div>
          
        </div>
      </section>

      <div class="curve-divider">
        <svg viewBox="0 0 1440 120" preserveAspectRatio="none">

          <defs>
            <!-- blue fade -->
            <linearGradient id="blueFade" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="#0a0f2c"/>
              <stop offset="40%" stop-color="#050a1a"/>
              <stop offset="100%" stop-color="#000"/>
            </linearGradient>

            <!-- orange line fade (sides fade out) -->
            <linearGradient id="orangeStroke" x1="0" y1="0" x2="1" y2="0">
              <stop offset="0%" stop-color="transparent"/>
              <stop offset="20%" stop-color="#ff7a18"/>
              <stop offset="50%" stop-color="#ff7a18"/>
              <stop offset="80%" stop-color="#ff7a18"/>
              <stop offset="100%" stop-color="transparent"/>
            </linearGradient>
          </defs>

          <!-- 🔵 blue curved section -->
          <path 
            d="M0,0 C480,-20 960,-20 1440,0 L1440,120 L0,120 Z"
            fill="url(#blueFade)"
          />

          <!-- 🔶 orange top line -->
          <path 
            d="M0,0 C480,-20 960,-20 1440,0"
            fill="none"
            stroke="url(#orangeStroke)"
            stroke-width="3"
          />
        </svg>
      </div>
    </main>


    
    <!-------------------- FOOTER --------------------------->
    <footer>



    </footer>




  </body>
</html>
