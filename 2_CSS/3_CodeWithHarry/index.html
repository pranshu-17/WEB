<!DOCTYPE html>
<html lang="en">
  <head> 
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Building Netflix Clone">
    <title>Netflix Clone</title>

    <!-- shorthand => link: css -->
    <link rel="stylesheet" href="style.css">

    <!-- Importing font-styles from google fonts -->
     <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@200..700&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">

    <!-- Importing font awesome for icons  -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  </head>

  <body>
    <!-------------------- HEADER --------------------------->
    <header>
      <nav class="navbar">
        <div class="nav-logo">
          <img src="assets/icons and logos/logo.svg" class="logo">
        </div>

        <div class="nav-buttons">
          <i class="fa-solid fa-language nav-lang-icon"></i>
          <select name="Language" class="nav-select">
            <option>English</option>
            <option>Hindi</option>
          </select>
          
          <button class="nav-signin">
            Sign In
          </button>
        </div>
      </nav>
    </header>



    
    <!--------------------- HERO ---------------------------> 
    <main>

      <div class="content">
        <div class="line1">
          Unlimited movies, shows, and more
        </div>

        <div class="line2">
          Starts at ₹149. Cancel at any time.
        </div>

        <div class="line3">
          Ready to watch? Enter your email to create or restart your membership
        </div>

        <div class="line4">
          <input type="text" placeholder="Email address">
          <button>Get Started &gt;</button>
        </div>
        
      </div>


    </main>


    
    <!-------------------- FOOTER --------------------------->
    <footer>



    </footer>




  </body>
</html>
