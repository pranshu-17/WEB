<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="building youtube clone from scratch">
  <title>Youtube clone</title>
  <link rel="stylesheet" href="1_style.css">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

</head> 
<body>

  <input class="search-bar" type="text" placeholder="Search">
  
  <div class="video-preview">

    <div class="thumbnail-row">
      <img src="thumbnails/thumbnail-1.webp" alt="thumbnail-1" class="thumbnail">
    </div>

    <div>
      <div class="channel-picture">
        <img src="logo/channel-1.jpeg" alt="channel-1" class="profile-picture">
      </div>

      <div class="video-info">

        <p class="video-title">
          Talking Tech and AI with Google CEO Sundar Pichai!
        </p>
        
        <p class="video-author">
          Marques Brownlee
        </p>
        
        <p class="video-stats">
          3.4M views &#183 6 months ago
        </p>
      </div>
    </div>

  </div>


  <div class="video-preview">
    <div clas="thumbnail-row">
      <img src="thumbnails/thumbnail-2.webp" alt="thumbnail-2" class="thumbnail">
    </div>

    <div class="info-row">
      <div class="channel-picture">
        <img src="logo/channel-2.jpeg" alt="channel-2" class="profile-picture">
      </div>

      <div class="video-info">
        <p class="video-title">Try Not To Laugh Challenge #9</p>
        <p class="video-author">Markiplier</p>
        <p class="video-stats">19M views · 4 years ago</p>
      </div>
    </div>

  </div>
  


</body>
</html>

<!-- NOTE
1) buttons have a default padding of 6px (left and right) and 1px (top and bottom)
