<!DOCTYPE html>

  <link rel="stylesheet" href="2_style.css">

<body>
  <!-- Position Property
  1) static : No changes in the position upon using top, bottom, left, right and z-index property because the position is set ot static ,ie, default position
  
  2) relative : element moves relative to its original position and original space is still reserved (top, bottom etc properties will work)

  3) absolute : positioned relative to its closest ancestor (ancestor element should be non-static) 
  
  4) fixed : fixed is positioned relative to the viewport (your screen). It is removed form normal flow
      NOT parent
      NOT page
      👉 only screen
    Real-world uses :
      Navbar that stays on top
      Chat button (bottom-right)
      “Back to top” button

  5) Sticky : relative + fixed. as soon as it reaches its positon it gets sticked on the page, no changes to its position upon scrolling
  
  NOTE:
  fixed → always stuck to screen (no scrolling effect)
  sticky → scrolls normally, then   
  sticks when needed

  6) z-index : decides which element stays at top in case of overlaps
  -->

  <h1>Position Playground</h1>
  
  <div id="box1"> box1</div>
  <div id="box2">box2</div>
  <div id="box3">box3</div>
  <div id="box4">box4</div>
</body>
</html>
